services:
  backend:
    build: .
    container_name: zonegym-backend
    env_file:
      - .env
    environment:
      - PORT=5000
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    container_name: zonegym-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./frontend/dist:/usr/share/nginx/html   